name: release-plz (Rust)

# Reusable workflow that runs release-plz against a Rust repo:
#   - On push to main, opens/updates a release PR with bumped versions
#     and generated changelog entries based on conventional commits.
#   - When that PR merges, tags and publishes the affected crates.
#
# The set of crates published (and any release-channel overrides) is
# configured by the caller's own `release-plz.toml`.
#
# Caller usage:
#
#   jobs:
#     release-plz:
#       permissions:
#         contents: write           # REQUIRED — caller must grant at job level
#         pull-requests: write      # REQUIRED — caller must grant at job level
#       uses: mythofmeat/repo-arch/.github/workflows/release-plz-rust.yml@main
#       secrets: inherit
#
# `secrets: inherit` is the easiest way to pass the optional secrets below.
# Tags created by release-plz with the default GITHUB_TOKEN do NOT trigger
# downstream workflows (anti-recursion safety) — set REPO_ARCH_TOKEN to a PAT
# with contents:write to make tag pushes fire on tag-triggered workflows like
# publish-arch-rust.yml.

on:
  workflow_call:
    inputs:
      system_deps:
        description: "Space-separated apt packages required to compile this crate at release time."
        required: false
        type: string
        default: ""
      command:
        description: "release-plz subcommand: 'release-pr' (open/update the release PR only), 'release' (tag + publish only), or empty for both (default). Splitting lets callers run release-pr on demand and release on push to main."
        required: false
        type: string
        default: ""
    secrets:
      CARGO_REGISTRY_TOKEN:
        description: "crates.io API token. Required at runtime if any crate in the repo has `publish = true`, but declared optional here so the workflow validates before the secret is configured in a freshly-created repo."
        required: false
      REPO_ARCH_TOKEN:
        description: "PAT used as GITHUB_TOKEN for release-plz. Required if you want tags created by release-plz to trigger downstream workflows (e.g. publish-arch-rust.yml on tag push). Falls back to the default GITHUB_TOKEN."
        required: false

jobs:
  release-plz:
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            mold build-essential pkg-config ${{ inputs.system_deps }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: ${{ inputs.command }}
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ARCH_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
