name: Publish Arch package (Go)

# Reusable workflow that builds a Go project's PKGBUILD inside an
# archlinux:latest container, merges the resulting packages into
# mythofmeat/repo-arch's rolling `latest` release, and creates a matching
# tag release on the caller's own repo with git-cliff release notes.
#
# Caller usage:
#
#   jobs:
#     arch:
#       permissions:
#         contents: write    # REQUIRED — caller must grant at job level
#       uses: mythofmeat/repo-arch/.github/workflows/publish-arch-go.yml@main
#       with:
#         pkgbuild_dir: packaging/arch
#         extra_pacman_packages: "alsa-lib"
#       secrets: inherit

on:
  workflow_call:
    inputs:
      pkgbuild_dir:
        description: "Directory containing the PKGBUILD (e.g. 'packaging/arch', 'contrib')"
        required: true
        type: string
      extra_pacman_packages:
        description: "Space-separated pacman packages to install beyond the base set"
        required: false
        type: string
        default: ""
    secrets:
      REPO_ARCH_TOKEN:
        description: "PAT with Contents: Read+Write on mythofmeat/repo-arch"
        required: true

env:
  REPO_NAME: repo-arch
  REPO_OWNER: mythofmeat

jobs:
  package:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Restore pacman package cache
        uses: actions/cache/restore@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-reusable-v1
          restore-keys: pacman-

      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel go git git-cliff jq nodejs github-cli sudo \
            ${{ inputs.extra_pacman_packages }}
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore go module + build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /home/builder/go/pkg/mod
            /home/builder/.cache/go-build
          key: go-cache-${{ hashFiles('**/go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-cache-${{ hashFiles('**/go.sum') }}-
            go-cache-

      - name: Mark workspace as git-safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || \
            { echo "::error::Tag is not on main — skipping build"; exit 1; }

      - name: Pin PKGBUILD to tag and local checkout
        working-directory: ${{ inputs.pkgbuild_dir }}
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          sed -i "s|^pkgver=.*|pkgver=${VER}|" PKGBUILD
          sed -i -E "s|^source=\(\"([^:]+)::git\+[^\"]*\"(.*)\)$|source=(\"\1::git+file://${GITHUB_WORKSPACE}#tag=${TAG}\"\2)|" PKGBUILD
          chown -R builder:builder "$GITHUB_WORKSPACE"
          mkdir -p /home/builder/go/pkg/mod /home/builder/.cache/go-build
          chown -R builder:builder /home/builder

      - name: Build packages
        working-directory: ${{ inputs.pkgbuild_dir }}
        run: sudo -u builder makepkg -sf --noconfirm --nocheck

      - name: Save go module + build cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            /home/builder/go/pkg/mod
            /home/builder/.cache/go-build
          key: go-cache-${{ hashFiles('**/go.sum') }}-${{ github.sha }}

      - name: Save pacman package cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-reusable-v1

      - name: Fetch existing repo database
        working-directory: ${{ inputs.pkgbuild_dir }}
        env:
          GH_TOKEN: ${{ secrets.REPO_ARCH_TOKEN }}
        run: |
          gh release download latest \
            -R "${REPO_OWNER}/${REPO_NAME}" \
            -p "${REPO_NAME}.db.tar.zst" \
            -p "${REPO_NAME}.files.tar.zst" \
            2>/dev/null || echo "No existing db; starting fresh."

      - name: Merge into repo database
        working-directory: ${{ inputs.pkgbuild_dir }}
        run: |
          sudo -u builder repo-add "${REPO_NAME}.db.tar.zst" *.pkg.tar.zst
          for link in "${REPO_NAME}.db" "${REPO_NAME}.files"; do
            cp -L "$link" "${link}.real"
            rm "$link"
            mv "${link}.real" "$link"
          done

      - name: Publish packages to repo-arch
        working-directory: ${{ inputs.pkgbuild_dir }}
        env:
          GH_TOKEN: ${{ secrets.REPO_ARCH_TOKEN }}
        run: |
          gh release upload latest \
            -R "${REPO_OWNER}/${REPO_NAME}" \
            --clobber \
            *.pkg.tar.zst \
            "${REPO_NAME}.db" "${REPO_NAME}.db.tar.zst" \
            "${REPO_NAME}.files" "${REPO_NAME}.files.tar.zst"

      - name: Generate release notes
        run: git-cliff --latest -o RELEASE_NOTES.md

      - name: Create caller tag release (notes only; idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file RELEASE_NOTES.md 2>/tmp/gh_err || {
              if grep -qi "already_exists\|already exists" /tmp/gh_err; then
                echo "Release ${TAG} already created by a sibling job; skipping."
              else
                cat /tmp/gh_err; exit 1
              fi
            }
